name: Publish SQLcl Release

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      release-page:
        description: "Oracle SQLcl release/download page"
        required: true
        default: "https://www.oracle.com/database/sqldeveloper/technologies/sqlcl/download/"

permissions:
  contents: write

concurrency:
  group: publish-sqlcl-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Discover current SQLcl release
        id: discover
        env:
          RELEASE_PAGE: ${{ inputs.release-page }}
        run: |
          python3 scripts/discover_sqlcl_release.py \
            --output-dir dist \
            --github-output "$GITHUB_OUTPUT" \
            --release-page "${RELEASE_PAGE:-"https://www.oracle.com/database/sqldeveloper/technologies/sqlcl/download/"}"

      - name: Check for existing release
        id: existing
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.discover.outputs.version }}
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create checksum-only release
        if: steps.existing.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.discover.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            "dist/sqlcl-$VERSION.zip.md5" \
            "dist/sqlcl-$VERSION.zip.sha1" \
            "dist/sqlcl-$VERSION.zip.sha256" \
            "dist/sqlcl-$VERSION.checksums.txt" \
            "dist/sqlcl-$VERSION.metadata.json" \
            --title "SQLcl $VERSION" \
            --notes-file dist/release-notes.md

      - name: Report existing release
        if: steps.existing.outputs.exists == 'true'
        run: echo "SQLcl ${{ steps.discover.outputs.version }} already exists."
